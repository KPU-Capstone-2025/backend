# /opt/monitoring/otel-config.yaml
receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318" # 에이전트 데이터 수신용

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"   # 🌟 Prometheus가 가져갈 수 있게 개방
    resource_to_telemetry_conversion:
      enabled: true            # 🌟 컨테이너 이름 등을 라벨로 변환해줌 (중요!)
  loki:
    endpoint: "http://localhost:3100/loki/api/v1/push"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus]  # 🌟 여기에 prometheus가 꼭 있어야 8889가 열립니다!
    logs:
      receivers: [otlp]
      exporters: [loki]